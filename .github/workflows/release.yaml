name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release dependencies
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/npm \
            conventional-changelog-conventionalcommits@7.0.2

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.DUGLEEBOT_TOKEN }}
          GIT_AUTHOR_NAME: dugleebot
          GIT_AUTHOR_EMAIL: 223939725+dugleebot@users.noreply.github.com
          GIT_COMMITTER_NAME: dugleebot
          GIT_COMMITTER_EMAIL: 223939725+dugleebot@users.noreply.github.com
        run: npx semantic-release
